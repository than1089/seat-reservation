services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seat_reservation
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      # Use the compose service name — host .env uses localhost for local dev.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/seat_reservation?schema=public
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CORS_ORIGIN: http://localhost:8080
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-webhook-secret}
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_API_URL: /api
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  postgres_data:
